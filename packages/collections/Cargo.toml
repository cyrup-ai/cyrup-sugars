[package]
name = "sugars_collections"
version.workspace = true
edition.workspace = true
authors = ["David Maple <david@cyrup.ai>"]
description = "Memory-efficient collection types: ZeroOneOrMany, OneOrMany, ByteSize"
repository = "https://github.com/cyrup-ai/cyrup-sugars"
license = "MIT OR Apache-2.0"
keywords = ["collections", "memory", "zero-allocation", "sugar"]
categories = ["data-structures", "rust-patterns"]

[lib]
path = "src/lib.rs"
name = "sugars_collections"

[dependencies]
serde = { version = "1.0.219", features = ["derive"] }
serde_json = { version = "1.0.140" }
hashbrown = { version = "0.15.4" }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[features]
default = []
hashbrown-json = []

[dev-dependencies]
pretty_assertions = "1.4.1"
