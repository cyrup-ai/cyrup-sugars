[package]
name = "sugars_builders"
version = "0.1.0"
edition = "2021"
authors = ["David Maple <david@cyrup.ai>"]
description = "Builder pattern utilities and helpers for cyrup_sugars"
repository = "https://github.com/cyrup-ai/sugars"
license = "MIT OR Apache-2.0"
keywords = ["builder", "pattern", "utilities", "sugar"]
categories = ["development-tools", "rust-patterns"]

[lib]
path = "src/lib.rs"

[dependencies]
sugars_collections = { path = "../collections", version = "0.1.0" }
sugars_async_task = { path = "../async_task", version = "0.1.0" }
sugars_macros = { path = "../macros", version = "0.1.0" }
hashbrown = "0.15.4"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = { version = "1.0.140" }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[features]
default = []
hashbrown-json = ["sugars_collections/hashbrown-json"]
