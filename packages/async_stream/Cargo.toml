[package]
name = "sugars_async_stream"
version.workspace = true
edition.workspace = true
authors = ["David Maple <david@cyrup.ai>"]
description = "Async stream utilities with multiple backend support"
repository = "https://github.com/cyrup-ai/sugars"
license = "MIT OR Apache-2.0"
keywords = ["async", "stream", "futures", "sugar"]
categories = ["asynchronous", "concurrency"]

[lib]
path = "src/lib.rs"

[dependencies]
sugars_async_task = { path = "../async_task", version = "0.1.2" }
sugars_collections = { path = "../collections", version = "0.1.2" }
tokio = { version = "1.46.1", features = ["rt", "sync", "macros"], optional = true }
futures = "0.3.31"
parking_lot = { version = "0.12.4", optional = true }
crossbeam = { version = "0.8.4", optional = true }
async-channel = { version = "2.5.0", optional = true }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[features]
default = ["tokio-backend"]
tokio-backend = ["tokio", "parking_lot"]
std-backend = ["async-channel"]
crossbeam-backend = ["crossbeam", "async-channel"]
