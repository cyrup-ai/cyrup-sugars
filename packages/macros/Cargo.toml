[package]
name = "sugars_macros"
version = "0.1.1"
edition = "2021"
authors = ["David Maple <david@cyrup.ai>"]
description = "Procedural macros for cyrup_sugars JSON syntax and collections"
repository = "https://github.com/cyrup-ai/sugars"
license = "MIT OR Apache-2.0"
keywords = ["macros", "proc-macro", "json", "sugar"]
categories = ["development-tools"]

[lib]
path = "src/lib.rs"
proc-macro = true

[dependencies]
hashbrown = { version = "0.15.4", features = ["serde"] }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }
syn = { version = "2.0", features = ["full", "extra-traits"] }
quote = "1.0"
proc-macro2 = "1.0"

[features]
default = []
