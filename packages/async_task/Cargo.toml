[package]
name = "sugars_async_task"
version.workspace = true
edition.workspace = true
authors = ["David Maple <david@cyrup.ai>"]
description = "Concrete async task types that avoid boxed futures"
repository = "https://github.com/cyrup-ai/sugars"
license = "MIT OR Apache-2.0"
keywords = ["async", "task", "futures", "sugar"]
categories = ["asynchronous", "concurrency"]

[lib]
path = "src/lib.rs"

[dependencies]
tokio = { version = "1.46.1", features = ["rt", "sync"], optional = true }
futures = "0.3.31"
parking_lot = { version = "0.12.4", optional = true }
sugars_collections = { path = "../collections", version = "0.1.2" }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[features]
default = ["tokio"]
tokio = ["dep:tokio", "parking_lot"]
