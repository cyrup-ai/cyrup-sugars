[package]
name = "sugars_gix"
version = "0.1.0"
edition = "2021"
authors = ["CYRUP Contributors"]
description = "Git object hash table interoperability for cyrup_sugars"
repository = "https://github.com/cyrup-ai/sugars"
license = "MIT OR Apache-2.0"
keywords = ["git", "gix", "hash", "interop", "sugar"]
categories = ["development-tools", "data-structures"]

[lib]
path = "src/lib.rs"

[dependencies]
gix-hash = "0.18.0"
parking_lot = "0.12.4"
hashbrown = "0.15.4"
workspace-hack = { version = "0.1", path = "../../workspace-hack" }
